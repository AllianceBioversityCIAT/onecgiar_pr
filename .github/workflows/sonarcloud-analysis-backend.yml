name: SonarCloud Analysis - Full Stack (Backend + Frontend)

on:
  push:
    branches: [dev, staging, main, staging-sonar]
  pull_request:
    branches: [dev, staging, main, staging-sonar]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Set up Java 17 for SonarCloud
      - name: Set up JDK 17 for SonarCloud analysis
        uses: actions/setup-java@v2
        with:
          java-version: "17"
          distribution: "temurin"

      # Step 2: Verify Java version
      - name: Verify Java version
        run: java -version

      # Step 3: Set JAVA_HOME and SONAR_JAVA_HOME
      - name: Set JAVA_HOME and SONAR_JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV
          echo "SONAR_JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      # Step 4: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 5: Set up Node.js 22
      - name: Set up Node.js 22
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      # Step 6: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 7: Load .env for backend
      - name: Load backend .env from AWS Secrets Manager
        run: |
          aws secretsmanager get-secret-value \
            --secret-id dev/app/backend/prms/reportingtool \
            --query SecretString \
            --output text > .env
        working-directory: ./onecgiar-pr-server

      - name: Load frontend environments from AWS Secrets Manager
        run: |
          mkdir -p src/environments
          aws secretsmanager get-secret-value \
            --secret-id dev/app/frontend/prms/reportingtool \
            --query SecretString \
            --output text | tee src/environments/environment.ts > src/environments/environment.prod.ts
        working-directory: ./onecgiar-pr-client

      # Step 9: Install backend dependencies
      - name: Install backend dependencies
        run: npm ci
        working-directory: ./onecgiar-pr-server

      # Step 10: Build backend
      - name: Build backend
        run: npm run build
        working-directory: ./onecgiar-pr-server

      # Step 12: Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./onecgiar-pr-client

      # Step 13: Build frontend
      - name: Build frontend
        run: npm run build
        working-directory: ./onecgiar-pr-client

      # Step 15: Install SonarScanner globally
      - name: Install SonarScanner
        run: npm install -g sonar-scanner

      # Step 16: Run SonarCloud analysis (backend + frontend)
      - name: Run SonarCloud analysis
        run: |
          sonar-scanner \
            -Dsonar.projectKey=AllianceBioversityCIAT_onecgiar_pr \
            -Dsonar.organization=alliancebioversityciat \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.sources=onecgiar-pr-server,onecgiar-pr-client \
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/migrations/**,**/*spec.ts \
            -Dsonar.coverage.exclusions=** \
            -Dsonar.typescript.lcov.reportPaths=onecgiar-pr-server/coverage/lcov.info,onecgiar-pr-client/coverage/lcov.info
            -Dsonar.newCode.referenceBranch=master
        working-directory: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
