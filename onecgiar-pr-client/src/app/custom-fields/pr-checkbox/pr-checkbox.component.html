<div class="checkbox_container">
  <input
    type="checkbox"
    class="pr-native-check"
    name="groupname"
    [disabled]="(readOnly || this.rolesSE.readOnly) && !isStatic"
    [(ngModel)]="value"
    (ngModelChange)="selectOptionEvent.emit()" />
  <div class="label pr-body-2" [innerHTML]="label"></div>
</div>
