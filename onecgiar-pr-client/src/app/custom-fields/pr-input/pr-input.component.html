@if (shouldRender()) {
  <div class="position-relative">
    <app-under-construction-point *ngIf="underConstruction()"></app-under-construction-point>
    @if (showFieldHeader()) {
      <app-field-card
        [label]="customLabel() || effectiveLabel()"
        [description]="effectiveDescription()"
        [required]="effectiveRequired()"
        [hasValue]="hasValue"
        [hasError]="!!maxWords() && wordCount() > maxWords() && !autogenerate()"
        [showDescription]="showDescription()"
        [descInlineStyles]="descInlineStyles()">
        <ng-container *ngTemplateOutlet="bodyTpl"></ng-container>
      </app-field-card>
    } @else {
      <ng-container *ngTemplateOutlet="bodyTpl"></ng-container>
    }
  </div>
}

<ng-template #bodyTpl>
  <div
    [ngSwitch]="(readOnly() || this.rolesSE.readOnly) && !isStatic()"
    [ngClass]="{ mandatory: effectiveRequired(), readOnly: (readOnly() || this.rolesSE.readOnly) && !isStatic() }"
    class="pr-input position-relative"
    [style]="InlineStyles()">
    <div
      class="text-secondary-400 pr-body-2"
      *ngSwitchCase="true"
      [innerHtml]="
        type() == 'link'
          ? aTag(value)
          : value == '0'
            ? 0
            : (value | yesOrNotByBoolean) || noDataText() || (effectiveRequired() ? this.notProvidedText : 'Not applicable')
      "></div>
    <div class="p-fluid input_container" *ngSwitchCase="false">
      <div class="input-validation">{{ value }}</div>
      <input
        *ngIf="type() != 'currency' && type() != 'number' && type() != 'email'"
        [disabled]="disabled()"
        pInputText
        [type]="type()"
        [placeholder]="effectivePlaceholder()"
        [(ngModel)]="value"
        [attr.prValid]="true"
        [ngClass]="{
          'pr-valid': true,
          'pr-body-2': true,
          invalid: wordCount() > maxWords() && !autogenerate(),
          warning: wordCount() > maxWords() && autogenerate()
        }"
        [style]="{ 'max-height': variant() === 'sm' ? '30px' : variant() === 'xs' ? '25px' : 'auto', width: '100%' }" />

      <div style="display: flex; flex-direction: column; gap: 2px" *ngIf="type() == 'email'">
        <input
          [disabled]="disabled()"
          pInputText
          type="email"
          [placeholder]="effectivePlaceholder()"
          [(ngModel)]="value"
          #emailInput="ngModel"
          [required]="effectiveRequired()"
          email
          [attr.prValid]="true"
          [ngClass]="{
            'pr-valid': true,
            'pr-body-2': true,
            invalid: emailInput.invalid || (wordCount() > maxWords() && !autogenerate()),
            warning: wordCount() > maxWords() && autogenerate()
          }"
          [style]="{ 'max-height': variant() === 'sm' ? '30px' : variant() === 'xs' ? '25px' : 'auto', width: '100%' }" />
        @if (emailInput.invalid) {
          <p-message severity="error" size="small" variant="simple">
            @if (emailInput.hasError('required')) {
              Email is Required.
            }
            @if (emailInput.hasError('email')) {
              Please enter a valid email.
            }
          </p-message>
        }
      </div>

      <p-inputNumber
        class=""
        *ngIf="type() == 'number'"
        [(ngModel)]="value"
        [disabled]="disabled()"
        [mode]="numberMode()"
        [minFractionDigits]="numberMode() && 2"
        [maxFractionDigits]="numberMode() && maxDecimals()"
        [min]="0"
        [ngClass]="{ 'pr-body-2': true }"
        [style]="{ 'max-height': variant() === 'sm' ? '30px' : variant() === 'xs' ? '25px' : 'auto', width: '100%' }"
        [placeholder]="effectivePlaceholder()">
      </p-inputNumber>

      <p-inputNumber
        class=""
        *ngIf="type() == 'currency'"
        [(ngModel)]="value"
        mode="currency"
        currency="USD"
        [ngClass]="{ 'pr-body-2': true }"
        locale="en-US"
        [disabled]="disabled()"
        [placeholder]="effectivePlaceholder()"
        [min]="0"
        [style]="{ width: '100%' }">
      </p-inputNumber>
      <div class="hints_container">
        <div class="hint">{{ hint() }}</div>
        <app-pr-word-counter *ngIf="maxWords()" [wordCount]="wordCount()" [maxWords]="maxWords()" [autogenerate]="autogenerate()"> </app-pr-word-counter>
      </div>
      <div class="custom_validation_tooltip_container" *ngIf="type() == 'link' && badLink && !readOnly() && !this.rolesSE.readOnly && value">
        <app-custom-validation-tooltip></app-custom-validation-tooltip>
      </div>
    </div>
    <app-pr-field-validations></app-pr-field-validations>
  </div>
</ng-template>
