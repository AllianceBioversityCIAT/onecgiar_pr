<div class="detail_container">
  <div id="alert"></div>
  <!-- P2-3036 (AC9): P25 Innovation in phase 2026+ uses the "location of benefit" wording; 2025 keeps "geographic focus". -->
  <div
    appFeedbackValidation
    [labelText]="
      this.fieldsManagerSE.isP25() && this.fieldsManagerSE.isAnInnovation()
        ? this.fieldsManagerSE.isGeographicLocation2026()
          ? 'What is the location of benefit for this result?'
          : 'What is the current geographic focus of the innovation development, testing and/or use?'
        : 'What is the main geographic focus of the Output?'
    "
    [isComplete]="!!this.geographicLocationBody.geo_scope_id"></div>

  <app-alert-status description="Select the geographic location/s where this result is taking place."> </app-alert-status>

  <app-alert-status
    *ngIf="this.api.dataControlSE.isKnowledgeProduct"
    description="In case some of the metadata fields are incorrect, please get in touch with the library staff of your Center to update them in the repository. Before the end of the reporting period, metadata will be automatically refreshed on this page.">
  </app-alert-status>

  <app-geoscope-management
    [description]="
      this.fieldsManagerSE.isP25() && this.fieldsManagerSE.isAnInnovation()
        ? this.fieldsManagerSE.isGeographicLocation2026()
          ? 'Location of benefit refers to the country, region, or global area where this result is reasonably expected to create benefit — directly or through partners.'
          : 'This should reflect geographies where the innovation development, testing and/or use has taken place'
        : undefined
    "
    [label]="
      this.fieldsManagerSE.isP25() && this.fieldsManagerSE.isAnInnovation()
        ? this.fieldsManagerSE.isGeographicLocation2026()
          ? 'What is the location of benefit for this result?'
          : 'What is the current geographic focus of the innovation development, testing and/or use?'
        : undefined
    "
    [body]="this.geographicLocationBody"
    module="reporting">
  </app-geoscope-management>

  <br />
  @if (this.geographicLocationBody.geo_scope_id != 1 && this.geographicLocationBody.geo_scope_id != 50 && this.geographicLocationBody.geo_scope_id) {
    <app-pr-radio-button
      fieldRef="[geoscope-management]-has_extra_geo_scope"
      [options]="[
        { value: true, label: 'Yes' },
        { value: false, label: 'No' }
      ]"
      optionLabel="label"
      [(ngModel)]="extraGeographicLocationBody.has_extra_geo_scope"
      optionValue="value">
    </app-pr-radio-button>
    <br />
    <div
      appFeedbackValidation
      labelText="Are there any regions that you wish to specify for this Output?"
      [isComplete]="this.extraGeographicLocationBody.has_extra_geo_scope !== undefined"></div>

    @if (this.extraGeographicLocationBody.has_extra_geo_scope) {
      <app-geoscope-management
        label="What is the geographic scope where there may be potential impact in other geographic areas?"
        [body]="this.extraGeographicLocationBody"
        [hideTobeDetermined]="true"
        module="reporting">
      </app-geoscope-management>
    }
  }

  <app-save-button class="position_sticky" (clickSave)="onSaveSection()" *ngIf="!this.api.dataControlSE.isKnowledgeProduct"></app-save-button>

  <app-sync-button (clickSave)="onSyncSection()"></app-sync-button>
</div>
