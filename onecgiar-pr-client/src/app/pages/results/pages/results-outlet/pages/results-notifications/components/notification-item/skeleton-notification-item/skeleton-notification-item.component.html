<div class="notification">
  <div class="notification_header">
    <div class="pr-skeleton" style="width:145px;height:23px" [style]="{ 'border-radius': '0 0 10px 10px', 'background-color': 'var(--pr-color-neutral-1000)' }"></div>

    <div class="pr-skeleton" style="width:145px;height:23px" [style]="{ 'border-radius': '0 0 10px 10px', 'background-color': 'var(--pr-color-neutral-1000)' }"></div>
  </div>

  <div class="notification_content">
    <div class="notification_content_body">
      <div class="pr-skeleton" style="width:100%;height:40px" [style]="{ 'background-color': 'var(--pr-color-neutral-1000)' }"></div>
    </div>

    <div class="notification_content_actions">
      <div class="notification_content_actions_buttons">
        <div class="pr-skeleton" style="width:120px;height:29px" [style]="{ 'background-color': 'var(--pr-color-neutral-1000)' }"></div>
        <div class="pr-skeleton" style="width:60px;height:29px" [style]="{ 'background-color': 'var(--pr-color-neutral-1000)' }"></div>
      </div>

      <div class="pr-skeleton" style="width:190px;height:18px" [style]="{ 'background-color': 'var(--pr-color-neutral-1000)', 'margin-top': '5px' }"></div>
    </div>
  </div>
</div>
