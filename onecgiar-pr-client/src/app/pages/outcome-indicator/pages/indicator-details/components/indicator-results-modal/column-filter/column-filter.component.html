<div class="filter-container">
  {{ title }}

  <app-pr-filter-multiselect
    class="column-filter-select"
    [options]="options"
    [optionLabel]="optionLabel"
    [optionValue]="optionValue"
    [placeholder]="placeholder"
    [filter]="true"
    [ngModel]="selected()"
    (changed)="onChanged($event)">
  </app-pr-filter-multiselect>
</div>
