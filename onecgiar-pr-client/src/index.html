<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PRMS Reporting</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <!-- Accessibility: apply the saved text-size preference before first paint (no flash). Mirrors FontScaleService. -->
    <script>
      (function () {
        try {
          var factors = { small: 0.9, default: 1, large: 1.15, larger: 1.3, largest: 1.5 };
          var saved = localStorage.getItem('pr.a11y.fontScale');
          document.documentElement.style.setProperty('--pr-font-scale', String(factors[saved] || 1));
        } catch (e) {}
      })();
    </script>
  </head>

  <body style="margin: 0px; background-color: var(--pr-color-accents-1); transition: all ease-in-out 0.3s !important">
    <app-root></app-root>
    <div class="Tawk_API_container"></div>
    <script src="https://cdn.lordicon.com/xdjxvujz.js"></script>
  </body>
</html>
